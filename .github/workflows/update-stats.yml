name: Update profile stats

on:
  schedule:
    # every day at ~06:17 UTC (GitHub may delay scheduled runs a bit)
    - cron: "17 6 * * *"
  workflow_dispatch:   # allows manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: update-stats
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate SVGs with live stats
        env:
          # GITHUB_TOKEN works for repos/stars/followers and usually for contributions.
          # For guaranteed contributions, add a PAT as the secret GH_TOKEN (read:user).
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python generate.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dark_mode.svg light_mode.svg
          if git diff --staged --quiet; then
            echo "No stat changes today."
          else
            git commit -m "chore: update profile stats [skip ci]"
            git push
          fi
